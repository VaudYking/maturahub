<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MaturaHub — Matura 2027</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --surface3: #22222c;
    --border: #2a2a38;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --math: #ef4444;
    --math-dim: #7f1d1d;
    --math-glow: rgba(239,68,68,0.15);
    --pol: #a855f7;
    --pol-dim: #4c1d95;
    --pol-glow: rgba(168,85,247,0.15);
    --eng: #3b82f6;
    --eng-dim: #1e3a8a;
    --eng-glow: rgba(59,130,246,0.15);
    --gold: #f59e0b;
    --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
  code, .mono { font-family: 'JetBrains Mono', monospace; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes pop { 0% { transform:scale(1); } 50% { transform:scale(1.08); } 100% { transform:scale(1); } }

  .fade-in { animation: fadeIn .35s ease both; }
  .fade-in-delay { animation: fadeIn .5s ease .1s both; }

  .progress-track {
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .progress-fill::after {
    content:'';
    position:absolute;
    right:0; top:0; bottom:0;
    width:20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.3));
  }

  .pill {
    display:inline-flex; align-items:center; gap:4px;
    padding:2px 10px;
    border-radius:99px;
    font-size:11px;
    font-weight:500;
    font-family:'Syne',sans-serif;
    letter-spacing:.03em;
  }

  input, textarea, select {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--eng);
  }
  textarea { resize: vertical; min-height: 70px; }

  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:8px 16px;
    border-radius:8px;
    font-family:'Syne',sans-serif;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    border:none;
    transition: all .2s;
    letter-spacing:.02em;
  }
  .btn:hover { transform:translateY(-1px); }
  .btn:active { transform:translateY(0); }
  .btn-primary { background: var(--eng); color:#fff; }
  .btn-primary:hover { background: #2563eb; box-shadow:0 4px 20px rgba(59,130,246,.4); }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover { background:var(--surface2); color:var(--text); }
  .btn-danger { background:var(--surface3); color:var(--math); border:1px solid var(--math-dim); }
  .btn-danger:hover { background:var(--math-glow); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color .2s;
  }
  .card:hover { border-color: var(--surface3); }

  .checkbox-custom {
    width:18px; height:18px;
    border-radius:5px;
    border:2px solid var(--border);
    display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: all .2s;
    flex-shrink:0;
  }
  .checkbox-custom.checked {
    background: var(--green);
    border-color: var(--green);
  }

  .modal-overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(4px);
    z-index:100;
    display:flex; align-items:center; justify-content:center;
    padding:16px;
    animation: fadeIn .2s ease;
  }
  .modal-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:28px;
    width:100%; max-width:560px;
    max-height:90vh;
    overflow-y:auto;
    position:relative;
  }

  .tab-nav {
    display:flex; gap:4px;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:4px;
  }
  .tab-item {
    flex:1; padding:10px 16px;
    border-radius:9px;
    font-family:'Syne',sans-serif;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    border:none;
    background:transparent;
    color:var(--muted);
    transition:all .2s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .tab-item.active { color:#fff; }
  .tab-item:hover:not(.active) { color:var(--text); background:var(--surface3); }

  .quiz-option {
    padding:12px 16px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface2);
    cursor:pointer;
    transition:all .2s;
    font-size:14px;
  }
  .quiz-option:hover { border-color:var(--eng); background:var(--eng-glow); }
  .quiz-option.correct { border-color:var(--green); background:rgba(34,197,94,.12); }
  .quiz-option.wrong { border-color:var(--math); background:var(--math-glow); }

  .streak-fire { animation: pop 1s ease infinite; }

  .level-badge {
    background: linear-gradient(135deg, var(--gold), #f97316);
    color:#000;
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:10px;
    padding:2px 8px;
    border-radius:99px;
    letter-spacing:.05em;
  }

  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:0;
    opacity:.4;
  }

  #root { position:relative; z-index:1; }

  .sidebar {
    width:240px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--border);
    height:100vh;
    position:sticky;
    top:0;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    padding:20px 12px;
    gap:4px;
  }

  .sidebar-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    border:none;
    background:transparent;
    color:var(--muted);
    font-family:'Outfit',sans-serif;
    font-size:13px;
    font-weight:500;
    transition:all .2s;
    width:100%;
    text-align:left;
  }
  .sidebar-item:hover { background:var(--surface2); color:var(--text); }
  .sidebar-item.active { background:var(--surface3); color:#fff; }

  mark { background:rgba(245,158,11,.25); color:var(--gold); border-radius:2px; padding:0 2px; }

  .pomo-ring {
    width:80px; height:80px;
    position:relative;
  }
  .pomo-ring svg { transform:rotate(-90deg); }
  .pomo-ring .time-label {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:500;
  }

  /* ─── MOBILE BOTTOM BAR ──────────────────────────────────────────────── */
  @media(max-width:768px) {
    .sidebar { display:none; }

    /* Bottom navigation bar */
    .mobile-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 62px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 9999;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .mobile-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: color .2s;
      padding: 4px 2px;
      border-radius: 10px;
      min-width: 0;
    }
    .mobile-nav-item.active {
      color: var(--eng);
    }
    .mobile-nav-item .nav-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--eng);
      opacity: 0;
      transition: opacity .2s;
    }
    .mobile-nav-item.active .nav-dot {
      opacity: 1;
    }

    /* Main content padding for bottom bar */
    .main-content-mobile {
      padding: 16px 14px 80px !important;
      max-width: 100% !important;
    }

    /* Modals on mobile - centered */
    .modal-box {
      max-width: calc(100% - 24px) !important;
      width: calc(100% - 24px) !important;
      max-height: 80vh !important;
      border-radius: 16px !important;
      padding: 20px 16px !important;
      position: relative !important;
      bottom: auto !important;
      margin: 0 auto !important;
    }
    .modal-overlay {
      align-items: flex-start !important;
      justify-content: center !important;
      padding: 16px 12px 80px !important;
      overflow-y: auto !important;
    }

    /* Cards padding */
    .card { padding: 14px; }

    /* Tab nav wrapping */
    .tab-nav { flex-wrap: wrap; }
    .tab-item { flex: none; font-size: 12px; padding: 8px 10px; }

    /* Quiz options touch friendly */
    .quiz-option { padding: 14px 12px; font-size: 15px; }

    /* Whiteboard floating window — full screen on mobile */
    .wb-window {
      left: 0 !important;
      top: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
    }
    /* Buttons font size */
    .btn { font-size: 12px; padding: 8px 12px; }

    /* More button padding in content */
    input, textarea, select { font-size: 16px !important; } /* prevent zoom on iOS/Android */
  }

  /* Desktop — hide mobile nav */
  @media(min-width:769px) {
    .mobile-nav { display: none !important; }
  }

  /* Attach menu (aparat vs galeria) */
  .attach-menu {
    position: absolute;
    bottom: 48px;
    left: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 500;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .attach-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text);
    font-family: Outfit, sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .attach-menu-item:hover { background: var(--surface3); }
</style>
</head>
